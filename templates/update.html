{% extends 'base.html' %}

{% block head %}
<Title>Task Manager</Title>
{% endblock %}

{% block body %}

<div class="content">

    <h1>Update Task</h1>

    <a href="/begin/{{task.id}}" class="button-link">Begin</a>
    <a href="/complete/{{task.id}}" class="button-link">Complete</a>
    <br>
    <br>
    <form action="/update/{{task.id}}" method="POST">
        <input type="text" name="content" id="content" value="{{task.content}}">
        <input type="submit" value="Update">
    </form>
</div>

{% endblock %}
